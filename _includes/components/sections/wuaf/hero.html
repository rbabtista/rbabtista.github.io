<section class="{{ page.hero.bg_class }} position-relative overflow-hidden"
         style="height: clamp(360px, 55vh, 620px);">

  <!-- Background image layer -->
  <figure class="position-absolute top-0 start-0 w-100 h-100 m-0" style="z-index: 1;">
    <img alt=""
         class="w-100 h-100"
         src="{{ page.hero.bg_image }}"
         style="object-fit: cover;">
  </figure>

  <!-- Optional: dark overlay for readability-->
  <div class="position-absolute top-0 start-0 w-100 h-100"
       style="background: rgba(0,0,0,.35); z-index: 1;"></div>

  <!-- Content layer -->
  <div class="container position-relative h-100" style="z-index: 2;">
    <div class="row h-100 align-items-center justify-content-center text-center">

      <div class="col-lg-10 col-xl-9 col-xxl-8 mx-auto"
           data-cues="zoomIn" data-delay="500" data-group="page-title" data-interval="-200">
        <h1 class="display-1 mb-4 text-white">{{ page.hero.title }}</h1>
        <p class="{{ page.hero.main_title_class }}">{{ page.hero.main_title }}</p>

        <div class="d-flex justify-content-center gap-3 flex-wrap"
             data-cues="zoomIn" data-delay="900" data-group="page-title-buttons">
          {% for button in page.hero.buttons %}
          <a class="{{ button.class }}" href="{{ button.url }}" target="_blank">{{ button.label }}</a>
          {% endfor %}
        </div>
      </div>

    </div>
  </div>
</section>
